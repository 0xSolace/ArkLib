name: Deploy δ* Paper to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "website/deltastar-paper/**"
      - ".github/workflows/deltastar-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/deltastar-paper/package-lock.json

      - name: Build δ* paper site
        working-directory: website/deltastar-paper
        run: |
          npm ci
          npm run build

      - name: Ensure miner onboarding files are deployed
        working-directory: website/deltastar-paper
        run: |
          node scripts/copy-mine.mjs
          cp public/mission.md public/skill.md public/codex.md out/
          test -s out/mission.md
          test -s out/skill.md
          test -s out/codex.md
          grep -q "mission-version:" out/mission.md
          grep -q "bootstrap-version:" out/skill.md
          grep -q "bootstrap-version:" out/codex.md

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=deltastar-paper --branch=main --commit-dirty=true
          workingDirectory: website/deltastar-paper
