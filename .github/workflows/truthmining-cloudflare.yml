name: Deploy Truth Mining to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "website/truthmining/**"
      - ".github/workflows/truthmining-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/truthmining/package-lock.json

      - name: Build Truth Mining site
        working-directory: website/truthmining
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=truthmining --branch=main --commit-dirty=true
          workingDirectory: website/truthmining
